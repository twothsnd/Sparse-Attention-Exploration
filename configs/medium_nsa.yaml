model:
  vocab_size: 50257
  max_seq_len: 4096
  n_layers: 12
  n_heads: 12
  n_embd: 768
  dropout: 0.0
  attention: nsa
  attention_kwargs:
    block_size: 64
    local_window: 512
    top_k_blocks: 6
train:
  batch_size: 2
  seq_len: 4096
  max_steps: 30000
  lr: 0.00025
  log_interval: 20
data:
  source: local_text
  files:
    - data/wikitext-103/wikitext-103-v1/train-*.parquet
  tokenizer: gpt2
  text_key: text
