model:
  vocab_size: 50257
  max_seq_len: 1024
  n_layers: 4
  n_heads: 4
  n_embd: 256
  dropout: 0.0
  attention: sliding
  attention_kwargs:
    window_size: 256
train:
  batch_size: 8
  seq_len: 512
  max_steps: 1000
  lr: 0.0003
  log_interval: 10
data:
  name: Salesforce/wikitext
  config: wikitext-103-v1
  split: train
  eval_split: validation
  tokenizer: gpt2
  streaming: true

