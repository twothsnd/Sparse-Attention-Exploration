model:
  vocab_size: 50257
  max_seq_len: 512
  n_layers: 2
  n_heads: 4
  n_embd: 256
  dropout: 0.0
  attention: full
train:
  batch_size: 2
  seq_len: 256
  max_steps: 20
  lr: 0.0003
  log_interval: 1
data:
  source: local_text
  files:
    - data/wikitext-103/wikitext-103-v1/train-00000-of-00002.parquet
  eval_files:
    - data/wikitext-103/wikitext-103-v1/validation-00000-of-00001.parquet
  text_key: text
  tokenizer: gpt2
